services:
  nginx:
    image: nginx:1.27-alpine
    container_name: adv-nginx
    restart: unless-stopped
    depends_on:
      - n8n
      - openclaw
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/n8n.conf:/etc/nginx/conf.d/n8n.conf:ro
      - ./nginx/openclaw.conf:/etc/nginx/conf.d/openclaw.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: adv-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DISABLE_PRODUCTION_MAIN_PROCESS=false
      - N8N_ENDPOINT_WEBHOOK=webhook
      - N8N_ENDPOINT_WEBHOOK_TEST=webhook-test
      - N8N_BASIC_AUTH_WEBHOOK=false
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - LINKEDIN_EDGE_FUNCTION_URL=${LINKEDIN_EDGE_FUNCTION_URL}
      - LINKEDIN_WEBHOOK_SECRET=${LINKEDIN_WEBHOOK_SECRET}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"

  openclaw:
    image: ghcr.io/bmorphism/openclaw:latest
    container_name: adv-openclaw
    restart: unless-stopped
    command: ["gateway", "--bind", "0.0.0.0", "--port", "18789"]
    environment:
      - OPENCLAW_CONFIG_DIR=/home/openclaw/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/openclaw/workspace
    volumes:
      - openclaw_config:/home/openclaw/.openclaw
      - openclaw_workspace:/home/openclaw/workspace
    expose:
      - "18789"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  certbot:
    image: certbot/certbot:latest
    container_name: adv-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: ["sh", "-c", "trap exit TERM; while :; do sleep 3600; done"]

volumes:
  n8n_data:
  openclaw_config:
  openclaw_workspace:
  certbot_www:
  certbot_conf:
