# ── n8n — flow.adventurelabs.com.br ──────────────────────────────────────────
server {
    server_name flow.adventurelabs.com.br;
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/flow.adventurelabs.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flow.adventurelabs.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = flow.adventurelabs.com.br) { return 301 https://$host$request_uri; }
    listen 80; server_name flow.adventurelabs.com.br; return 404;
}

