networks:
  adventure_network:
    driver: bridge

volumes:
  n8n_data:
  metabase_data:
  evolution_data:
  uptime_data:
  adventure_postgres_data:
  infisical_redis_data:

services:
  # ─── n8n (flow.adventurelabs.com.br) ───
  n8n:
    image: n8nio/n8n:latest
    container_name: adventure-n8n
    restart: unless-stopped
    networks:
      - adventure_network
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=flow.adventurelabs.com.br
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://flow.adventurelabs.com.br/
      - N8N_EDITOR_BASE_URL=https://flow.adventurelabs.com.br/
      - N8N_SECURE_COOKIE=true
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - NODE_OPTIONS=--max-old-space-size=768
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Metabase (bi.adventurelabs.com.br) ───
  # JAVA_OPTS limita heap JVM a 1GB para não derrubar a stack com 8GB de RAM
  metabase:
    image: metabase/metabase:latest
    container_name: adventure-metabase
    restart: unless-stopped
    networks:
      - adventure_network
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase.db
    environment:
      - JAVA_OPTS=-Xmx1g -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      - MB_JETTY_PORT=3000
      - MB_SITE_URL=https://bi.adventurelabs.com.br
      - MB_SITE_NAME=Adventure Labs BI
      - MB_SITE_LOCALE=pt_BR
      - MB_ANON_TRACKING_ENABLED=false
      - TZ=America/Sao_Paulo
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─── Shared Postgres (Infisical + Evolution API) ───
  adventure-postgres:
    image: postgres:15-alpine
    container_name: adventure-postgres
    restart: unless-stopped
    networks:
      - adventure_network
    volumes:
      - adventure_postgres_data:/var/lib/postgresql/data
      - /opt/adventure-labs/postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=infisical
      - POSTGRES_USER=infisical
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256m

  # ─── Infisical Redis (shared: Infisical db0, Evolution db2) ───
  infisical-redis:
    image: redis:7-alpine
    container_name: adventure-infisical-redis
    restart: unless-stopped
    networks:
      - adventure_network
    volumes:
      - infisical_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    deploy:
      resources:
        limits:
          memory: 128m

  # ─── Infisical (vault.adventurelabs.com.br) ───
  infisical:
    image: infisical/infisical:latest
    container_name: adventure-infisical
    restart: unless-stopped
    networks:
      - adventure_network
    ports:
      - "8082:8080"
    environment:
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET}
      - SITE_URL=https://vault.adventurelabs.com.br
      - DB_CONNECTION_URI=postgresql://infisical:${POSTGRES_PASSWORD}@adventure-postgres:5432/infisical
      - REDIS_URL=redis://infisical-redis:6379
      - TELEMETRY_ENABLED=false
      - TZ=America/Sao_Paulo
    depends_on:
      - adventure-postgres
      - infisical-redis
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Evolution API (api-wa.adventurelabs.com.br) ───
  # v2.3.7 compilado nativamente na VPS (x86_64) — usa Baileys 7.0.0-rc.9
  # CACHE_REDIS_ENABLED=true obrigatório para Baileys iniciar; usa Redis db2
  evolution-api:
    image: evolution-api:2.3.7
    container_name: adventure-evolution
    restart: unless-stopped
    networks:
      - adventure_network
    ports:
      - "8081:8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=https://api-wa.adventurelabs.com.br
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - QRCODE_LIMIT=30
      - QRCODE_EXPIRATION_LIMIT=60
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://infisical:${POSTGRES_PASSWORD}@adventure-postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - LOG_LEVEL=ERROR,WARN,LOG,INFO
      - LOG_BAILEYS=warn
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://infisical-redis:6379/2
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - DEL_INSTANCE=false
      - LANGUAGE=pt-BR
      - TZ=America/Sao_Paulo
    depends_on:
      - adventure-postgres
      - infisical-redis
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Uptime Kuma (status.adventurelabs.com.br) ───
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: adventure-uptime
    restart: unless-stopped
    networks:
      - adventure_network
    ports:
      - "3001:3001"
    volumes:
      - uptime_data:/app/data
    environment:
      - TZ=America/Sao_Paulo
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
