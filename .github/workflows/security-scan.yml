name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Detectar credenciais expostas (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PRs: fetch apenas os commits do PR para não redetectar histórico antigo.
          # Push em main: fetch-depth 0 para scan completo.
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 0 }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Escaneia apenas os commits novos em PRs (evita redetectar histórico já sanado)
          GITLEAKS_LOG_OPTS: ${{ github.event_name == 'pull_request' && format('HEAD~{0}..HEAD', github.event.pull_request.commits) || '' }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # necessário para repos privados em orgs

  governance:
    name: Verificar governança do repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Verificar package-lock.json (allowlist em monorepo-governance.yml)
        run: bash tools/scripts/check-repo-governance.sh

      - name: Verificar yarn.lock proibidos
        run: |
          FOUND=$(find . -name "yarn.lock" \
            -not -path "./.git/*" \
            -not -path "*/node_modules/*" | head -10)
          if [ -n "$FOUND" ]; then
            echo "❌ yarn.lock encontrado(s) — apenas pnpm-lock.yaml é permitido:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ Nenhum yarn.lock encontrado."

      - name: Verificar arquivos proibidos
        run: |
          FOUND=$(find . \
            -not -path "./.git/*" \
            -not -path "*/node_modules/*" \
            \( -name "client_secret*.json" \
               -o -name "service_account*.json" \
               -o -name "token.json" \) | head -10)
          if [ -n "$FOUND" ]; then
            echo "❌ Arquivos de credencial encontrados no repo:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ Nenhum arquivo de credencial encontrado."
